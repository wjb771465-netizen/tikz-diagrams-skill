name: Compile TikZ

on:
  push:
    branches:
      - tikz-compile
    paths:
      - '**.tex'

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq texlive-xetex texlive-latex-recommended texlive-latex-extra poppler-utils

      - name: Compile TikZ files
        run: |
          mkdir -p output
          for f in *.tex; do
            [ -f "$f" ] || continue
            name="${f%.tex}"
            echo "==> Compiling $f"
            xelatex -interaction=nonstopmode -halt-on-error "$f"
            xelatex -interaction=nonstopmode -halt-on-error "$f"
            pdftoppm -png -r 300 "${name}.pdf" "${name}"
            cp "${name}.pdf" "output/"
            cp "${name}-1.png" "output/${name}.png" 2>/dev/null || cp "${name}.png" "output/" 2>/dev/null || true
          done
          ls -la output/

      - name: Upload to Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest Build
          artifacts: "output/*"
          allowUpdates: true
          makeLatest: true
          body: "自动编译生成，最近一次提交: ${{ github.sha }}"
